name: Release

# Tag-triggered npm publish.
# Uses npm trusted publishing via GitHub OIDC (no stored long-lived token,
# automatic Sigstore provenance). NPM_TOKEN secret is a fallback for when
# the one-time npmjs.com trusted-publisher UI setup has not been completed
# (Package -> Settings -> Trusted Publisher on npmjs.com).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      otp:
        description: "npm 2FA one-time password"
        required: false
        default: ""

# Least-privilege at the workflow level: do NOT grant id-token here.
# id-token: write is scoped to the publish job only.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC trusted publishing + automatic provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # npm 10.x (shipped with node 22) does not support OIDC trusted publishing.
      # Requires npm >= 11.5.1.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm test

      # OIDC trusted publishing is auto-detected when id-token: write is present
      # AND npm >= 11.5.1. NODE_AUTH_TOKEN is a fallback for NPM_TOKEN secret.
      - name: Publish to npm
        run: npm publish --access public ${NPM_OTP:+--otp="$NPM_OTP"}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_OTP: ${{ github.event.inputs.otp }}
