name: 'proctor'
description: 'Catch AI agents gaming their test suites — SARIF + Code Scanning'
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v7
      with:
        node-version: '20'
    # Build in the action's own checkout (github.action_path), not the consumer's workspace —
    # when this action is used from another repo, github.workspace is that repo and has no
    # proctor sources to build.
    - name: Build proctor
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci && npm run build
    - name: Determine diff base ref
      id: base
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        # Unshallow first: actions/checkout defaults to a 1-commit-deep clone, which
        # leaves no connecting history between HEAD and any other ref, so a later
        # `git diff base...HEAD` fails with "no merge base" even after fetching base.
        git fetch --no-tags --unshallow 2>/dev/null || true
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"
          echo "ref=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
        elif git rev-parse --verify --quiet "${{ github.event.before }}" >/dev/null 2>&1; then
          echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
        else
          echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
        fi
    - name: Run proctor check --sarif
      shell: bash
      run: node "${{ github.action_path }}/dist/cli.js" check --base "${{ steps.base.outputs.ref }}" --sarif > results.sarif
    - name: Upload SARIF to Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif
