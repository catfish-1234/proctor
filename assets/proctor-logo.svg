<svg width="128" height="128" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="proctor logo">
  <!-- eye almond (the watch) -->
  <path d="M4 32 Q32 10 60 32 Q32 54 4 32 Z" fill="#111418"/>
  <!-- inner almond highlight for depth -->
  <path d="M9 32 Q32 15.5 55 32 Q32 48.5 9 32 Z" fill="#1B2027"/>
  <!-- iris = a real, verified pass -->
  <circle cx="32" cy="32" r="12.5" fill="#22C55E"/>
  <circle cx="32" cy="32" r="12.5" fill="none" stroke="#111418" stroke-width="1.5"/>
  <!-- checkmark pupil: the pass is genuine -->
  <path d="M26 32.4 L30.4 37 L39 26.8" fill="none" stroke="#0B0F13" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- catch-light -->
  <circle cx="37" cy="27" r="1.7" fill="#EAFBF0"/>
</svg>
